<div class="course-card"
     [ngClass]="cardClasses"
     [ngStyle]="{
       'border-left': course.gradeStatus === 'passed'
         ? '6px solid green'
         : course.gradeStatus === 'failed'
         ? '6px solid red'
         : '6px solid gray'
     }">

  <h3>{{ course.name }}</h3>

  <p>ID: {{ course.id }}</p>

  <p>Code: {{ course.code }}</p>

  <p>Credits: {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <span *ngSwitchCase="'passed'" style="color:green">
      Passed
    </span>

    <span *ngSwitchCase="'failed'" style="color:red">
      Failed
    </span>

    <span *ngSwitchCase="'pending'" style="color:gray">
      Pending
    </span>

  </div>

  <br>

  <button (click)="toggleEnrollment()">
  {{ isEnrolled() ? 'Unenroll' : 'Enroll' }}
</button>

  <button (click)="toggleDetails()">
    Show Details
  </button>

</div>

<hr>
