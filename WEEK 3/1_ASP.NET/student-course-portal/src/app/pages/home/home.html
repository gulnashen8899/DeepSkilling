<h1>{{ portalName }}</h1>

<p>
  Manage your courses, track your academic progress, and view your student profile.
</p>

<h3>Portal Statistics</h3>

<ul>
  <li>Total Courses: {{ courseCount }}</li>
  <li>Courses Available: 12</li>
  <li>Enrolled: 3</li>
  <li>GPA: 3.8</li>
</ul>

<hr>

<!-- Property Binding -->
<button [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search course..."
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<!--
[property]
One-way binding (Component → DOM)

[(ngModel)]
Two-way binding (DOM ↔ Component)
-->
